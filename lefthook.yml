# Fast, parallel git hooks. Runs only on staged files and re-stages fixes.
# Install once with `pnpm prepare` (runs `lefthook install`).
pre-commit:
  parallel: true
  commands:
    format:
      glob: "*.{js,jsx,ts,tsx,json,jsonc,css,md,mdx,yaml,yml}"
      run: pnpm exec oxfmt --write {staged_files}
      stage_fixed: true
    lint:
      glob: "*.{js,jsx,ts,tsx}"
      run: pnpm exec oxlint --fix {staged_files}
      stage_fixed: true
    tokens:
      glob: "*.{ts,tsx}"
      run: pnpm exec tsx tooling/catalog-lint/src/check-tokens.ts {staged_files}

commit-msg:
  commands:
    commitlint:
      run: pnpm exec commitlint --edit {1}

pre-push:
  commands:
    typecheck:
      run: pnpm typecheck
