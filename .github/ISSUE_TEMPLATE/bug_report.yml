name: Bug report
description: Report something that isn't working as expected.
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
    validations:
      required: true
  - type: input
    id: package
    attributes:
      label: Affected package / app
      placeholder: "e.g. apps/web, packages/ui"
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: Environment
      placeholder: "Node, pnpm, OS versions (`node -v`, `pnpm -v`)"
