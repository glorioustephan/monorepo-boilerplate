name: Release

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    name: Version / Publish (Changesets)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Opens/updates a "Version Packages" PR when changesets are present, and
      # publishes on merge. NOTE: every package is currently `"private": true`, so
      # `changeset publish` is a deliberate no-op (nothing is pushed to npm) — the
      # versioning/changelog flow still works. Drop `private` and set `NPM_TOKEN`
      # on a package to actually publish it.
      - name: Create Release Pull Request or publish
        uses: changesets/action@v1
        with:
          version: pnpm changeset:version
          publish: pnpm changeset:publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
