packages:
  - 'apps/*'
  - 'mcp-servers/*'
  - 'services/*'
  - 'tooling/*'
  - 'packages/*'
  - 'docs'

allowBuilds:
  esbuild: true
  lefthook: true
  onnxruntime-node: true
  protobufjs: true
  sharp: true

# Centralized dependency versions. Reference with "catalog:" in any package.json.
# Bump a version here once and it applies across the whole monorepo.
catalog:
  # Framework
  '@vercel/config': ^0.5.0
  next: ^16.2.6
  react: ^19.2.6
  react-dom: ^19.2.6
  babel-plugin-react-compiler: ^1.0.0
  next-themes: ^0.4.6

  # Language + types
  typescript: ^6.0.3
  '@types/node': ^25.9.1
  '@types/react': ^19.2.0
  '@types/react-dom': ^19.2.0

  # Tooling
  turbo: ^2.9.14
  oxlint: ^1.66.0
  oxfmt: ^0.51.0
  lefthook: ^2.1.8
  '@changesets/cli': ^2.31.0
  '@commitlint/cli': ^21.0.1
  '@commitlint/config-conventional': ^21.0.1
  tsx: ^4.22.3
  tsdown: ^0.22.0

  # Validation / env
  zod: ^4.4.3
  '@t3-oss/env-nextjs': ^0.13.11

  # Styling
  tailwindcss: ^4.3.0
  '@tailwindcss/postcss': ^4.3.0
  '@tailwindcss/vite': ^4.3.0
  clsx: ^2.1.1
  tailwind-merge: ^3.6.0
  class-variance-authority: ^0.7.1
  lucide-react: ^1.16.0
  radix-ui: ^1.4.3
  '@radix-ui/themes': ^3.3.0
  '@radix-ui/react-icons': ^1.3.2

  # AI chat primitives (prompt-kit port; runtime deps of packages/ui)
  react-markdown: ^10.1.0
  remark-gfm: ^4.0.1
  remark-breaks: ^4.0.0
  shiki: ^3.0.0
  use-stick-to-bottom: ^1.1.1

  # Storybook (component workshop; lives in packages/ui)
  storybook: ^10.4.1
  '@storybook/react-vite': ^10.4.1
  '@storybook/addon-docs': ^10.4.1
  '@storybook/addon-a11y': ^10.4.1
  '@storybook/addon-vitest': ^10.4.1
  vite: ^8.0.14

  # MCP
  '@modelcontextprotocol/sdk': ^1.29.0

  # Embeddings (UI catalog semantic search; MiniLM via ONNX)
  '@huggingface/transformers': ^4.2.0

  # Documentation site (VitePress)
  vitepress: ^1.6.4
  vue: ^3.5.34

  # Catalog tooling (build-time only; never in packages/ui runtime)
  ts-morph: ^28.0.0

  # Database
  drizzle-orm: ^0.45.2
  drizzle-kit: ^0.31.10
  postgres: ^3.4.9

  # Testing
  vitest: ^4.1.7
  '@vitest/browser': ^4.1.7
  '@vitest/browser-playwright': ^4.1.7
  '@vitejs/plugin-react': ^6.0.2
  '@playwright/test': ^1.60.0
  playwright: ^1.60.0
  jsdom: ^29.1.1
  '@testing-library/react': ^16.3.2
  '@testing-library/dom': ^10.4.1
  '@testing-library/jest-dom': ^6.9.1
